; PHP Memory Configuration
memory_limit = 2G

; Error Reporting
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On

; Maximum execution time
max_execution_time = 120

; Maximum input time
max_input_time = 60

; Maximum input variables
max_input_vars = 10000

; Post maximum size
post_max_size = 64M

; Upload maximum filesize
upload_max_filesize = 64M

; Date timezone
date.timezone = UTC

; Session
session.gc_maxlifetime = 1440

; Enable Extensions
extension=pdo_mysql
extension=mysqli
extension=mysql
